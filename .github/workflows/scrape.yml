name: Nordirland Transfers aktualisieren

on:
  schedule:
    # 4 Läufe am Tag, je 5 Vereine (siehe select_clubs_for_this_run in
    # scrape_kader.py) - falls eine GitHub-Adresse gerade schlecht
    # angesehen wird, sind nur 5 statt 20 Vereine betroffen, und der
    # nächste Lauf (neue Adresse) hat wieder eine faire Chance.
    - cron: '5 23 * * *'
    - cron: '5 5 * * *'
    - cron: '5 11 * * *'
    - cron: '5 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Transferliste scrapen
        run: python scrape.py
        continue-on-error: true

      - name: Alle Vereine abgleichen (Kadergruppe je nach Uhrzeit)
        if: always()
        run: python scrape_kader.py
        continue-on-error: true
        env:
          FORCE_ALL_CLUBS: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}

      - name: Änderungen committen
        if: always()
        run: |
          git config user.name "nordirland-transfer-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json kader_latest.json kader_changes.json
          if ! git diff --staged --quiet; then
            git commit -m "Transferdaten aktualisiert"
            git pull --rebase origin main
            git push
          else
            echo "Keine Änderungen."
          fi

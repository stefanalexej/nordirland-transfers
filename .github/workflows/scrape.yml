name: Nordirland Transfers aktualisieren

on:
  schedule:
    # 23:05 UTC = 01:05 Uhr deutsche Sommerzeit (kurz nach dem nächtlichen
    # AO-Reset um 0:01 Uhr). GitHub Actions kennt nur UTC, keine Zeitzonen -
    # im Winter (CET statt CEST) läuft der Job dann um 00:05 Uhr statt 01:05.
    # Das ist unkritisch, Hauptsache "nach dem Reset".
    - cron: '5 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Transferliste scrapen
        run: python scrape.py
        continue-on-error: true

      - name: Alle 20 Kader abgleichen
        if: always()
        run: python scrape_kader.py
        continue-on-error: true

      - name: Änderungen committen
        if: always()
        run: |
          git config user.name "nordirland-transfer-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json kader_latest.json kader_changes.json
          if ! git diff --staged --quiet; then
            git commit -m "Transferdaten aktualisiert"
            git pull --rebase origin main
            git push
          else
            echo "Keine Änderungen."
          fi
